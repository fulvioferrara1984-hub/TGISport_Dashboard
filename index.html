<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Eventi</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --cell: #1a1a1a;
    --text: #f0f0f0;
    --accent: #ff9d00;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    flex: 0 0 auto;
    text-align: left;
    font-size: 3vw;
    padding: 10px 20px;
    color: rgb(0, 0, 0);
    background-color: rgb(53, 171, 249);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.table-wrap {
    flex: 1 1 auto;
    min-height: 0;
    padding: 6px 0;
}

table {
    width: 100%;
    height: 100%;
    border-collapse: separate;
    border-spacing: 6px;
    table-layout: fixed;
}

th {
    font-size: 1vw;
    color: rgb(53, 171, 249);
}

th, td {
    background: var(--cell);
    padding: 5px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    text-align: center;
    border-radius: 6px;
}

td {
    font-size: 1.1vw;
}

/* mantiene proporzioni sempre uguali: 1 header + 10 righe dati */
#board-body tr {
    height: calc((100% - 6px * 11) / 11);
}

.placeholder-row td {
    color: transparent;
}

.placeholder-row img {
    opacity: 0;
}

.col-small { width: 6%; }
.col-medium { width: 7%; }
.col-logo { width: 4%; }
.col-xsmall { width: 5%; }
.col-mediumlarge { width: 8%; }
.col-normal { width: auto; }

.confirmed { color: #00ff88; }
.cancelled { color: #ff3b3b; }
.pending { color: #ffd000; }

.flip-col {
    animation: flip 0.6s ease;
    backface-visibility: hidden;
}

.rolling-active {
    font-family: 'Courier New', monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
}

.flip-row {
    animation: flip 0.8s ease;
}

@keyframes flip {
    0% { transform: rotateX(90deg); opacity: 0; }
    100% { transform: rotateX(0); opacity: 1; }
}

.logo-img {
    max-height: 16px;
    max-width: 100%;
    object-fit: contain;
}
</style>
</head>
<body>

<header>
  <h1 style="margin: 0; font-size: 1em;">LIVE EVENTS 2 DASHBOARD</h1>

  <div style="position: relative; height: 1em; display: flex; align-items: center; justify-content: flex-end; min-width: 180px;">
    <img id="headerLogo" src="TGILogo.png" alt="Logo"
         style="height: 1em; width: auto; transition: opacity 1s ease-in-out; position: absolute; opacity: 1;">

    <span id="headerDateTime"
          style="font-size: 0.5em; font-family: 'Courier New', Courier, monospace; font-weight: bold; white-space: nowrap; transition: opacity 1s ease-in-out; position: absolute; opacity: 0;">
    </span>
  </div>
</header>

<div class="table-wrap">
  <table>
    <tbody id="board-body"></tbody>
  </table>
</div>

<script>
let allData = [];
let headers = [];
let extraIndex = 0;
let pageIndex = 0;
let lastExtraIndex = 0;

const ROWS_PER_PAGE = 10;
const CSV_URL = "./eventi.csv"; // qui potrai mettere anche un URL pubblico generato automaticamente

const logo = document.getElementById('headerLogo');
const dateTimeDisplay = document.getElementById('headerDateTime');
let showingLogo = true;

function updateDateTime() {
    const ora = new Date();
    const giorno = String(ora.getDate()).padStart(2, '0');
    const mese = String(ora.getMonth() + 1).padStart(2, '0');
    const anno = ora.getFullYear();
    const ore = String(ora.getHours()).padStart(2, '0');
    const minuti = String(ora.getMinutes()).padStart(2, '0');
    const secondi = String(ora.getSeconds()).padStart(2, '0');
    dateTimeDisplay.innerText = `${giorno}/${mese}/${anno} - ${ore}:${minuti}:${secondi}`;
}

function toggleHeaderElement() {
    if (showingLogo) {
        updateDateTime();
        logo.style.opacity = '0';
        dateTimeDisplay.style.opacity = '1';
    } else {
        logo.style.opacity = '1';
        dateTimeDisplay.style.opacity = '0';
    }
    showingLogo = !showingLogo;
}

setInterval(updateDateTime, 1000);
setInterval(toggleHeaderElement, 10000);
updateDateTime();

function loadData() {
    Papa.parse(CSV_URL, {
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
            headers = results.data[0] || [];
            allData = (results.data.slice(1) || []).filter(row => row.some(cell => String(cell || '').trim() !== ''));

            const maxPageIndex = Math.max(Math.ceil(allData.length / ROWS_PER_PAGE) - 1, 0);
            if (pageIndex > maxPageIndex) pageIndex = 0;

            render(true);
        }
    });
}

function getStatusClass(value) {
    if (!value) return '';
    value = value.toUpperCase();
    if (value.includes('CONFIRMED')) return 'confirmed';
    if (value.includes('CANCELLED')) return 'cancelled';
    if (value.includes('PENDING')) return 'pending';
    return '';
}

function rollingText(element, finalText) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let iterations = 0;

    const interval = setInterval(() => {
        element.textContent = finalText
            .split('')
            .map((char, index) => {
                if (index < iterations) return finalText[index];
                return chars[Math.floor(Math.random() * chars.length)];
            })
            .join('');

        iterations += 0.5;

        if (iterations >= finalText.length) {
            clearInterval(interval);
            element.textContent = finalText;
            element.classList.remove('rolling-active');
        }
    }, 30);
}

function appendCell(tr, text = '', classes = [], options = {}) {
    const td = document.createElement('td');
    td.textContent = text;
    classes.forEach(c => c && td.classList.add(c));
    if (options.statusClass) td.classList.add(options.statusClass);
    tr.appendChild(td);
    return td;
}

function createEmptyRow(isPlaceholder = false) {
    const tr = document.createElement('tr');
    if (isPlaceholder) tr.classList.add('placeholder-row');

    const tdLogo = document.createElement('td');
    tdLogo.classList.add('col-logo');
    tdLogo.style.padding = '2px';
    const img = document.createElement('img');
    img.src = 'Loghi/default.png';
    img.classList.add('logo-img');
    tdLogo.appendChild(img);
    tr.appendChild(tdLogo);

    for (let i = 0; i < 3; i++) appendCell(tr, '', [i === 1 ? 'col-xsmall' : 'col-small']);
    for (let i = 3; i < 7; i++) {
        const cls = i === 4 ? 'col-xsmall' : (i === 5 || i === 6 ? 'col-small' : 'col-normal');
        appendCell(tr, '', [cls]);
    }
    for (let i = 0; i < 3; i++) appendCell(tr, '', [i === 2 ? 'col-mediumlarge' : '']);
    appendCell(tr, '', ['col-medium']);

    return tr;
}

function render(isPageChange = false) {
    const tbody = document.getElementById('board-body');
    tbody.innerHTML = '';

    const start = pageIndex * ROWS_PER_PAGE;
    const pageData = allData.slice(start, start + ROWS_PER_PAGE);

    const headerRow = document.createElement('tr');

    const thLogo = document.createElement('th');
    thLogo.textContent = '';
    thLogo.classList.add('col-logo');
    thLogo.style.backgroundColor = '#050505';
    headerRow.appendChild(thLogo);

    for (let i = 0; i < 3; i++) {
        const th = document.createElement('th');
        th.textContent = headers[i] || '';
        th.classList.add(i === 1 ? 'col-xsmall' : 'col-small');
        headerRow.appendChild(th);
    }

    for (let i = 3; i < 7; i++) {
        const th = document.createElement('th');
        th.textContent = headers[i] || '';
        th.classList.add(i === 4 ? 'col-xsmall' : (i === 5 || i === 6 ? 'col-small' : 'col-normal'));
        headerRow.appendChild(th);
    }

    for (let i = 0; i < 3; i++) {
        const th = document.createElement('th');
        th.textContent = headers[7 + extraIndex + i] || '';
        if (i === 2) th.classList.add('col-mediumlarge');
        headerRow.appendChild(th);
    }

    const thLast = document.createElement('th');
    thLast.textContent = headers[16] || '';
    thLast.classList.add('col-medium');
    headerRow.appendChild(thLast);

    tbody.appendChild(headerRow);

    pageData.forEach(row => {
        const tr = document.createElement('tr');
        if (isPageChange) tr.classList.add('flip-row');

        const tdLogo = document.createElement('td');
        tdLogo.classList.add('col-logo');
        tdLogo.style.padding = '2px';
        const img = document.createElement('img');
        img.src = 'Loghi/' + (row[17] || 'default.png');
        img.classList.add('logo-img');
        tdLogo.appendChild(img);
        tr.appendChild(tdLogo);

        for (let i = 0; i < 3; i++) appendCell(tr, row[i] || '', [i === 1 ? 'col-xsmall' : 'col-small']);

        for (let i = 3; i < 7; i++) {
            const cls = i === 4 ? 'col-xsmall' : (i === 5 || i === 6 ? 'col-small' : 'col-normal');
            appendCell(tr, row[i] || '', [cls]);
        }

        for (let i = 0; i < 3; i++) {
            const td = appendCell(tr, '', [i === 2 ? 'col-mediumlarge' : '']);
            const value = row[7 + extraIndex + i] || '';
            if (extraIndex !== lastExtraIndex) {
                setTimeout(() => {
                    td.classList.add('flip-col');
                    rollingText(td, value);
                }, i * 500);
            } else {
                td.textContent = value;
            }
        }

        appendCell(tr, row[16] || '', ['col-medium'], { statusClass: getStatusClass(row[16]) });
        tbody.appendChild(tr);
    });

    // riempie sempre fino a 10 righe per mantenere le proporzioni dell'ultima pagina
    const placeholders = ROWS_PER_PAGE - pageData.length;
    for (let i = 0; i < placeholders; i++) {
        tbody.appendChild(createEmptyRow(true));
    }

    lastExtraIndex = extraIndex;
}

setInterval(() => {
    extraIndex = (extraIndex + 3) % 9;
    render(false);
}, 10000);

setInterval(() => {
    const totalPages = Math.max(Math.ceil(allData.length / ROWS_PER_PAGE), 1);
    pageIndex = (pageIndex + 1) % totalPages;
    render(true);
}, 60000);

setInterval(loadData, 60000);
loadData();
</script>

</body>
</html>
