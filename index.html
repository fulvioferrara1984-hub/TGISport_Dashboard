<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Eventi</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050505;
    --cell:#1a1a1a;
    --text:#f0f0f0;
    --accent:#35abf9;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Montserrat',sans-serif;
    width:100vw;
    height:100vh;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--accent);
    padding:10px 20px;
    color:black;
}

table {
    width:100%;
    height:90vh;
    table-layout:fixed;
    border-spacing:6px;
}

th, td {
    background:var(--cell);
    text-align:center;
    border-radius:6px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

th {
    font-size:clamp(14px,1vw,22px);
    color:#35abf9;
}

td {
    font-size:clamp(18px,1.3vw,50px);
    padding:10px;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
}

/* colonne */
.col-small { width:6%; }
.col-logo { width:8%; }
.col-normal { width:auto; }

/* stato */
.confirmed { color:#00ff88; }
.cancelled { color:#ff3b3b; }
.pending { color:#ffd000; }

/* flip */
.flip-col { animation: flip 0.6s ease; }
.flip-row { animation: flip 0.8s ease; }

@keyframes flip {
    0% { transform:rotateX(90deg); opacity:0; }
    100% { transform:rotateX(0); opacity:1; }
}

/* rolling */
.rolling-active {
    font-family:'Courier New', monospace;
    font-variant-numeric:tabular-nums;
    letter-spacing:2px;
}

/* logo */
.logo-img {
    max-height:40px;
    object-fit:contain;
}
</style>
</head>

<body>

<header>
<h1 style="margin:0;font-size:1.2em;">LIVE VIRTUAL PRODUCTIONS</h1>
<img src="TGILogo.png" style="height:1.2em;">
</header>

<table aria-label="Tabellone eventi">
<thead id="board-head"></thead>
<tbody id="board-body"></tbody>
</table>

<script>
let allData = [];
let headers = [];

let extraIndex = 0;
let pageIndex = 0;
let lastExtraIndex = 0;

let isAnimating = false;
let intervals = [];

const ROWS_PER_PAGE = 10;

// ===================== CSV =====================
function loadData() {
    Papa.parse("./eventi.csv", {
        download:true,
        skipEmptyLines:true,
        complete:(res)=>{
            headers = res.data[0] || [];
            allData = res.data.slice(1);
            render(true);
        },
        error:(err)=>{
            console.error("Errore CSV:",err);
        }
    });
}

// ===================== STATUS =====================
function getStatusClass(v) {
    if (!v) return "";
    v = v.toUpperCase();

    if (v === "CONFIRMED") return "confirmed";
    if (v === "CANCELLED") return "cancelled";
    if (v === "NOT CONFIRMED") return "pending";

    return "";
}

// ===================== ROLLING =====================
function rollingText(el, text) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let i = 0;

    el.classList.add("rolling-active");

    function animate() {
        el.textContent = text.split("").map((c, idx)=>{
            if (idx < i) return text[idx];
            return chars[Math.floor(Math.random()*chars.length)];
        }).join("");

        i += 0.5;

        if (i >= text.length) {
            el.textContent = text;
            el.classList.remove("rolling-active");
            return;
        }

        let progress = i / text.length;
        let delay = 20 + (progress * progress * 120);

        setTimeout(animate, delay);
    }

    animate();
}

// ===================== RENDER =====================
function render(isPageChange=false) {

    if (isAnimating) return;
    isAnimating = true;

    const head = document.getElementById("board-head");
    const body = document.getElementById("board-body");

    head.innerHTML = "";
    body.innerHTML = "";

    const start = pageIndex * ROWS_PER_PAGE;
    const pageData = allData.slice(start, start + ROWS_PER_PAGE);

    // HEADER
    const trHead = document.createElement("tr");

    for (let i=0;i<6;i++) {
        const th = document.createElement("th");
        th.textContent = headers[i] || "";
        trHead.appendChild(th);
    }

    for (let i=0;i<3;i++) {
        const th = document.createElement("th");
        th.textContent = headers[6 + extraIndex + i] || "";
        trHead.appendChild(th);
    }

    const thLast = document.createElement("th");
    thLast.textContent = headers[15] || "";
    trHead.appendChild(thLast);

    head.appendChild(trHead);

    // BODY
    const fragment = document.createDocumentFragment();

    pageData.forEach((row, rowIndex)=>{

        setTimeout(()=>{

            const tr = document.createElement("tr");

            if (isPageChange) tr.classList.add("flip-row");

            // fisse
            for (let i=0;i<6;i++) {
                const td = document.createElement("td");
                td.textContent = row[i] || "";
                tr.appendChild(td);
            }

            // dinamiche
            for (let i=0;i<3;i++) {
                const td = document.createElement("td");
                tr.appendChild(td);

                const value = row[6 + extraIndex + i] || "";

                if (extraIndex !== lastExtraIndex) {
                    setTimeout(()=>{
                        td.classList.add("flip-col");
                        rollingText(td,value);
                    }, i * 500);
                } else {
                    td.textContent = value;
                }
            }

            // status
            const tdLast = document.createElement("td");
            tdLast.textContent = row[15] || "";
            tdLast.classList.add(getStatusClass(row[15]));
            tr.appendChild(tdLast);

            fragment.appendChild(tr);

            if (rowIndex === pageData.length - 1) {
                body.appendChild(fragment);
                isAnimating = false;
            }

        }, rowIndex * 120); // delay righe
    });

    lastExtraIndex = extraIndex;
}

// ===================== INTERVALS =====================
function startIntervals() {

    intervals.forEach(clearInterval);
    intervals = [];

    intervals.push(setInterval(()=>{
        extraIndex = (extraIndex + 3) % 9;
        render(false);
    }, 20000));

    intervals.push(setInterval(()=>{
        pageIndex++;
        if (pageIndex * ROWS_PER_PAGE >= allData.length) pageIndex = 0;
        render(true);
    }, 60000));

    intervals.push(setInterval(loadData,60000));
}

// ===================== START =====================
loadData();
startIntervals();
</script>

</body>
</html>
