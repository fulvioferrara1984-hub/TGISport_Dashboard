<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Eventi Vintage</title>

<!-- Libreria CSV -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
    --bg-color: #050505;
    --flap-bg: #1a1a1a;
    --text-color: #f0f0f0;
    --accent: #ff9d00;
}

body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Courier New', monospace;
}

header {
    background: #000;
    padding: 25px;
    text-align: center;
    font-size: 45px;
    letter-spacing: 10px;
    color: var(--accent);
    border-bottom: 6px solid #111;
}

table {
    width: 100%;
    border-spacing: 8px;
}

td {
    background: var(--flap-bg);
    height: 90px;
    font-size: 24px;
    padding: 10px;
    border-radius: 6px;
    text-transform: uppercase;
}

.rotating {
    color: var(--accent);
}
</style>
</head>

<body>

<header>TABELLONE EVENTI UFFICIO</header>

<table>
    <tbody id="board-body"></tbody>
</table>

<script>
let allData = [];
let extraIndex = 0;

function loadData() {
    console.log("Carico CSV...");

    Papa.parse("eventi.csv", {
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
            console.log("CSV caricato:", results.data);
            allData = results.data.slice(1);
            render();
        },
        error: function(err) {
            console.error("Errore CSV:", err);
        }
    });
}

function render() {
    const tbody = document.getElementById("board-body");
    tbody.innerHTML = "";

    if (allData.length === 0) {
        tbody.innerHTML = "<tr><td>Nessun dato trovato</td></tr>";
        return;
    }

    allData.slice(0, 7).forEach(row => {
        const tr = document.createElement("tr");

        // 7 colonne fisse
        for (let i = 0; i < 7; i++) {
            const td = document.createElement("td");
            td.textContent = row[i] || "";
            tr.appendChild(td);
        }

        // 2 colonne dinamiche
        for (let i = 0; i < 2; i++) {
            const td = document.createElement("td");
            td.className = "rotating";
            td.textContent = row[7 + extraIndex + i] || "";
            tr.appendChild(td);
        }

        tbody.appendChild(tr);
    });
}

// Rotazione colonne
setInterval(() => {
    extraIndex = (extraIndex + 2) % 10;
    render();
}, 7000);

// Reload CSV
setInterval(loadData, 60000);

// Start
loadData();
</script>

</body>
</html>
