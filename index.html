<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Eventi Vintage</title>

<!-- Libreria CSV -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
    --bg-color: #050505;
    --flap-bg: #1a1a1a;
    --text-color: #f0f0f0;
    --accent: #ff9d00;
}

body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Courier New', monospace;
}

header {
    background: #000;
    padding: 25px;
    text-align: center;
    font-size: 45px;
    letter-spacing: 10px;
    color: var(--accent);
    border-bottom: 6px solid #111;
}

table {
    width: 100%;
    border-spacing: 8px;
}

td {
    background: var(--flap-bg);
    height: 90px;
    font-size: 24px;
    padding: 10px;
    border-radius: 6px;
    text-transform: uppercase;
}

.rotating {
    color: var(--accent);
}
</style>
</head>

<body>

<header>TABELLONE EVENTI UFFICIO</header>

<table>
    <tbody id="board-body"></tbody>
</table>

<script>
let allData = [];
let headers = [];
let extraIndex = 0;

function loadData() {
    Papa.parse("./eventi.csv", {
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
            headers = results.data[0]; // intestazioni
            allData = results.data.slice(1);
            render();
        }
    });
}

function render() {
    const tbody = document.getElementById("board-body");
    tbody.innerHTML = "";

    // 🔹 HEADER
    const headerRow = document.createElement("tr");

    // Colonne fisse 1-6
    for (let i = 0; i < 6; i++) {
        const th = document.createElement("th");
        th.textContent = headers[i] || "";
        headerRow.appendChild(th);
    }

    // Colonne dinamiche (3)
    for (let i = 0; i < 3; i++) {
        const th = document.createElement("th");
        th.textContent = headers[6 + extraIndex + i] || "";
        th.style.color = "var(--accent)";
        headerRow.appendChild(th);
    }

    // Colonna fissa 16
    const thLast = document.createElement("th");
    thLast.textContent = headers[15] || "";
    headerRow.appendChild(thLast);

    tbody.appendChild(headerRow);

    // 🔹 DATI
    allData.slice(0, 7).forEach(row => {
        const tr = document.createElement("tr");

        // Fisse 1-6
        for (let i = 0; i < 6; i++) {
            const td = document.createElement("td");
            td.textContent = row[i] || "";
            tr.appendChild(td);
        }

        // Dinamiche (3 colonne)
        for (let i = 0; i < 3; i++) {
            const td = document.createElement("td");
            td.className = "rotating";
            td.textContent = row[6 + extraIndex + i] || "";
            tr.appendChild(td);
        }

        // Fissa 16
        const tdLast = document.createElement("td");
        tdLast.textContent = row[15] || "";
        tr.appendChild(tdLast);

        tbody.appendChild(tr);
    });
}

// Rotazione ogni 6 secondi
setInterval(() => {
    extraIndex = (extraIndex + 3) % 9; // 9 colonne dinamiche (7→15)
    render();
}, 6000);

// Reload CSV ogni minuto
setInterval(loadData, 60000);

loadData();
</script>

</body>
</html>
