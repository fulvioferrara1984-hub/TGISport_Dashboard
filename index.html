<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone Eventi</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --cell: #1a1a1a;
    --text: #f0f0f0;
    --accent: #ff9d00;
}

body {
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    width:100vw;
    height:100vh;
}

header {
    text-align:left;
    font-size:4vw;
    padding:1vh;
    color:rgb(0, 0, 0);
}

table {
    width:100%;
    height:90vh;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

th {
    font-size:1.2vw;
    color:rgb(53, 171, 249);
}

td {
    font-size:1.5vw; /* 🔥 richiesto */
}

td, th {
    background:var(--cell);
    padding:10px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    text-align:center;
    border-radius:6px;
}

/* larghezza fissa colonne */
td, th {
    width:10%;
}

/* colori stato */
.confirmed { color: #00ff88; }
.cancelled { color: #ff3b3b; }
.pending { color: #ffd000; }

/* flip colonne */
.flip-col {
    animation: flip 0.6s ease;
}

/* flip riga */
.flip-row {
    animation: flip 0.8s ease;
}

@keyframes flip {
    0% { transform: rotateX(90deg); opacity:0; }
    100% { transform: rotateX(0); opacity:1; }
}
</style>
</head>

<body>

<header style="background-color: rgb(53, 171, 249); display: flex; align-items: center; justify-content: space-between;padding: 10px 20px; color: black;">
<h1 style="margin: 0; font-size: 1.0em;">LIVE VIRTUAL PRODUCTIONS</h1>
  <!-- Il logo a destra -->
<img src="TGILogo.png" alt="Logo" style="height: 1.0em; width: auto;">
</header>

<table>
<tbody id="board-body"></tbody>
</table>

<script>
let allData = [];
let headers = [];

let extraIndex = 0;
let pageIndex = 0;

let lastExtraIndex = 0;

const ROWS_PER_PAGE = 10;

function loadData() {
    Papa.parse("./eventi.csv", {
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
            headers = results.data[0];
            allData = results.data.slice(1);
            render(true); // full refresh
        }
    });
}

function getStatusClass(value) {
    if (!value) return "";
    value = value.toUpperCase();

    if (value.includes("CONFIRMED") && !value.includes("NOT")) return "confirmed";
    if (value.includes("CANCELLED")) return "cancelled";
    if (value.includes("NOT")) return "pending";
    return "";
}

function render(isPageChange = false) {
    const tbody = document.getElementById("board-body");
    tbody.innerHTML = "";

    const start = pageIndex * ROWS_PER_PAGE;
    const pageData = allData.slice(start, start + ROWS_PER_PAGE);

    // HEADER
    const headerRow = document.createElement("tr");

    for (let i = 0; i < 6; i++) {
        const th = document.createElement("th");
        th.textContent = headers[i] || "";
        headerRow.appendChild(th);
    }

    for (let i = 0; i < 3; i++) {
        const th = document.createElement("th");
        th.textContent = headers[6 + extraIndex + i] || "";
        //th.style.color = "var(--accent)";
        headerRow.appendChild(th);
    }

    const thLast = document.createElement("th");
    thLast.textContent = headers[15] || "";
    headerRow.appendChild(thLast);

    tbody.appendChild(headerRow);

    // DATI
    pageData.forEach(row => {
        const tr = document.createElement("tr");

        // flip riga SOLO cambio pagina
        if (isPageChange) {
            tr.classList.add("flip-row");
        }

        // colonne fisse
        for (let i = 0; i < 6; i++) {
            const td = document.createElement("td");
            td.textContent = row[i] || "";
            tr.appendChild(td);
        }

        // colonne dinamiche
        for (let i = 0; i < 3; i++) {
            const td = document.createElement("td");
            td.textContent = row[6 + extraIndex + i] || "";

            // flip SOLO se cambiano colonne
            if (extraIndex !== lastExtraIndex) {
                td.classList.add("flip-col");
            }

            tr.appendChild(td);
        }

        // ultima colonna
        const tdLast = document.createElement("td");
        tdLast.textContent = row[15] || "";
        tdLast.classList.add(getStatusClass(row[15]));
        tr.appendChild(tdLast);

        tbody.appendChild(tr);
    });

    lastExtraIndex = extraIndex;
}

// 🔄 colonne ogni 20 sec
setInterval(() => {
    extraIndex = (extraIndex + 3) % 9;
    render(false);
}, 20000);

// 📄 pagina ogni 60 sec
setInterval(() => {
    pageIndex++;
    if (pageIndex * ROWS_PER_PAGE >= allData.length) {
        pageIndex = 0;
    }
    render(true);
}, 60000);

// reload CSV
setInterval(loadData, 60000);

loadData();
</script>

</body>
</html>
